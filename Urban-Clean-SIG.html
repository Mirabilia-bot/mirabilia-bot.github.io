<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>URBAN-CLEAN | Spot2gether & KGM Expertise</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://unpkg.com/leaflet.heat/dist/leaflet-heat.js"></script>
  <style>
    body { margin:0; font-family:'Segoe UI',sans-serif; background:#f4f4f4; }
    #filters { padding:10px; background:#e8f5e9; display:flex; gap:15px; }
    #map { height:50vh; }
    #dashboard { height:50vh; background:white; padding:15px; box-shadow:0 -5px 15px rgba(0,0,0,0.1); overflow:auto; }
    canvas { max-height:200px; margin-top:15px; }
  </style>
</head>
<body>
  <div id="filters">
    <label>Quartier :
      <select id="filterQuartier">
        <option value="all">Tous</option>
        <option value="Kliklamé">Kliklamé</option>
        <option value="Bé">Bé</option>
        <option value="Tokoin">Tokoin</option>
      </select>
    </label>
    <label>Type :
      <select id="filterType">
        <option value="all">Tous</option>
        <option value="dechets">Déchets</option>
        <option value="pollution">Pollution</option>
        <option value="securite">Sécurité</option>
      </select>
    </label>
    <label>Date :
      <input type="date" id="filterDate">
    </label>
    <button onclick="demanderPosition()">📍 Me localiser</button>
  </div>

  <div id="map"></div>
  <div id="dashboard">
    <h3>Tableau de bord</h3>
    <div id="stats"></div>
    <canvas id="chartTypes"></canvas>
    <canvas id="chartQuartiers"></canvas>
  </div>

<script>
  var map = L.map('map').setView([6.1319,1.2228],13);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

  // Icônes différenciés
  const icons = {
    dechets: L.divIcon({html:'<i class="fas fa-trash" style="color:#fc3d21;font-size:22px"></i>'}),
    pollution: L.divIcon({html:'<i class="fas fa-smog" style="color:#007bff;font-size:22px"></i>'}),
    securite: L.divIcon({html:'<i class="fas fa-exclamation-triangle" style="color:#f57c00;font-size:22px"></i>'})
  };

  // Exemple de données
  const data = [
    {quartier:'Kliklamé',type:'dechets',desc:'Tas d’ordures',lat:6.14,lng:1.22,date:'2025-08-23'},
    {quartier:'Bé',type:'pollution',desc:'Fumée industrielle',lat:6.13,lng:1.21,date:'2025-09-02'},
    {quartier:'Tokoin',type:'securite',desc:'Décharge sauvage',lat:6.15,lng:1.23,date:'2025-09-05'}
  ];

  let markerPool={};
  let heatPoints=[];

  function renderMap(filtered){
    Object.values(markerPool).forEach(m=>map.removeLayer(m));
    markerPool={};
    heatPoints=[];
    filtered.forEach(d=>{
      markerPool[d.desc]=L.marker([d.lat,d.lng],{icon:icons[d.type]}).addTo(map)
        .bindPopup(`<b>${d.desc}</b><br><small>${d.quartier} - ${d.date}</small>`);
      heatPoints.push([d.lat,d.lng,0.5]);
    });
    L.heatLayer(heatPoints,{radius:25}).addTo(map);
  }

  function updateDashboard(filtered){
    const stats=document.getElementById('stats');
    stats.innerHTML=`<b>${filtered.length}</b> signalements`;
    const typeCount={}, quartierCount={};
    filtered.forEach(d=>{
      typeCount[d.type]=(typeCount[d.type]||0)+1;
      quartierCount[d.quartier]=(quartierCount[d.quartier]||0)+1;
    });
    new Chart(document.getElementById('chartTypes'),{
      type:'pie',
      data:{labels:Object.keys(typeCount),datasets:[{data:Object.values(typeCount),backgroundColor:['#fc3d21','#007bff','#f57c00']}]}
    });
    new Chart(document.getElementById('chartQuartiers'),{
      type:'bar',
      data:{labels:Object.keys(quartierCount),datasets:[{label:'Signalements',data:Object.values(quartierCount),backgroundColor:'#1b5e20'}]}
    });
  }

  function applyFilters(){
    const q=document.getElementById('filterQuartier').value;
    const t=document.getElementById('filterType').value;
    const d=document.getElementById('filterDate').value;
    const filtered=data.filter(x=>(q==="all"||x.quartier===q)&&(t==="all"||x.type===t)&&(!d||x.date===d));
    renderMap(filtered);
    updateDashboard(filtered);
  }

  // Localisation robuste
  function demanderPosition(){
    if("permissions" in navigator){
      navigator.permissions.query({name:'geolocation'}).then(res=>{
        if(res.state==='denied'){
          alert("Chrome bloque la localisation. Cliquez sur le cadenas à gauche de l'URL et autorisez 'Position'.");
        } else {
          navigator.geolocation.getCurrentPosition(p=>{
            map.flyTo([p.coords.latitude,p.coords.longitude],16);
          },()=>alert("Erreur GPS : Activez la localisation."),{enableHighAccuracy:true});
        }
      });
    }
  }

  // Initialisation
  applyFilters();
  document.getElementById('filterQuartier').addEventListener('change',applyFilters);
  document.getElementById('filterType').addEventListener('change',applyFilters);
  document.getElementById('filterDate').addEventListener('change',applyFilters);
</script>
</body>
</html>
